name = "vibepop-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[vars]
JWT_SECRET = "vibepop-dev-secret-change-in-production"

[[kv_namespaces]]
binding = "KV"
id = "placeholder-kv-id"
preview_id = "placeholder-kv-preview-id"

[[r2_buckets]]
binding = "R2"
bucket_name = "vibepop-assets"
